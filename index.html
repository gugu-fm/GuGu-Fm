<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="LpNg8lLi-L5k1GnSc_jsV1l-ASR5fLolmHpyIleHr-M" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuGu Novels — Write & Read Premium Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="guguApp()" class="bg-[#06070b] text-white font-sans antialiased selection:bg-indigo-500/30">

    <header class="fixed inset-x-0 top-0 z-40 border-b border-white/10 bg-[#06070b]/90 backdrop-blur-xl">
        <div class="mx-auto flex max-w-[1600px] items-center gap-3 px-4 py-3 lg:px-6">
            <button @click="mobileNavOpen = !mobileNavOpen" class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 lg:hidden">
                <span x-text="mobileNavOpen ? '✕' : '☰'"></span>
            </button>
            <div class="flex items-center gap-3">
                <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 via-fuchsia-500 to-emerald-400 text-sm font-black shadow-lg shadow-fuchsia-500/20">GN</div>
                <div>
                    <div class="text-lg font-semibold leading-none">GuGu Novels</div>
                    <div class="text-xs text-white/55">Premium Reader Platform</div>
                </div>
            </div>
            <div class="hidden flex-1 items-center gap-3 lg:flex pl-4">
                <button @click="view = 'home'; activeChapter = null" :class="view === 'home' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Home</button>
                <button @click="view = 'library'; activeChapter = null" :class="view === 'library' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Library</button>
                <button @click="view = 'admin'; activeChapter = null" :class="view === 'admin' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Writer Panel</button>
            </div>
        </div>
    </header>

    <div x-show="mobileNavOpen" x-transition class="fixed inset-x-0 top-[68px] z-50 bg-[#06070b] border-b border-white/10 p-4 lg:hidden space-y-2">
        <button @click="view = 'home'; activeChapter = null; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">🏠 Home</button>
        <button @click="view = 'library'; activeChapter = null; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">📚 Library</button>
        <button @click="view = 'admin'; activeChapter = null; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">⚙️ Writer Panel</button>
    </div>

    <div class="mx-auto grid max-w-[1600px] grid-cols-1 gap-4 px-4 pb-28 pt-24 lg:grid-cols-[260px_1fr] lg:px-6">
        
        <aside class="hidden lg:block">
            <div class="sticky top-24 space-y-3 rounded-[28px] border border-white/10 bg-white/5 p-4">
                <button @click="view = 'home'; activeChapter = null" :class="view === 'home' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">🏠 Home</button>
                <button @click="view = 'library'; activeChapter = null" :class="view === 'library' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">📚 Library</button>
                <button @click="view = 'admin'; activeChapter = null" :class="view === 'admin' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">⚙️ Writer Panel</button>
            </div>
        </aside>

        <main class="space-y-6">
            
            <div x-show="view === 'home'" class="space-y-8">
                <div class="space-y-3">
                    <div class="font-bold text-zinc-100 text-lg flex items-center gap-2">✍️ Selected Novels</div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        <template x-for="novel in novels">
                            <div @click="selectNovel(novel)" :class="activeNovel?.id === novel.id ? 'border-indigo-500 bg-indigo-500/10' : 'border-white/10 bg-white/5'" class="w-full rounded-[24px] border p-3 cursor-pointer transition transform hover:scale-105 hover:bg-white/10">
                                <img :src="novel.cover" class="h-44 w-full object-cover rounded-xl shadow-md" />
                                <h4 class="font-bold text-sm mt-2 truncate text-zinc-100" x-text="novel.title"></h4>
                                <p class="text-[11px] text-zinc-400 font-medium" x-text="novel.genre"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" x-show="activeNovel">
                    <div class="lg:col-span-1 rounded-[32px] border border-white/10 bg-white/5 p-5 h-fit space-y-3">
                        <img :src="activeNovel?.cover" class="w-full h-56 object-cover rounded-2xl shadow-xl" />
                        <h2 class="text-xl font-bold text-white" x-text="activeNovel?.title"></h2>
                        <span class="inline-block bg-indigo-500/20 text-indigo-300 text-xs px-3 py-1 rounded-full font-bold" x-text="activeNovel?.genre"></span>
                        <p class="text-xs text-zinc-400 leading-relaxed" x-text="activeNovel?.description"></p>
                    </div>

                    <div class="lg:col-span-2 rounded-[32px] border border-white/10 bg-white/5 p-5">
                        <h3 class="text-md font-bold mb-4 text-zinc-300">📖 Index (Chapters)</h3>
                        <div class="space-y-2 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                            <template x-for="(ch, index) in chapters.filter(c => c.novelId === activeNovel?.id)">
                                <div @click="readChapter(ch)" class="flex items-center justify-between p-4 rounded-xl border border-white/5 bg-zinc-900/40 hover:bg-zinc-800/60 cursor-pointer transition">
                                    <div class="flex items-center gap-3">
                                        <div class="h-8 w-8 rounded-lg bg-indigo-600/20 text-indigo-400 flex items-center justify-center font-bold text-xs" x-text="index + 1"></div>
                                        <div class="font-bold text-sm text-zinc-200" x-text="ch.title"></div>
                                    </div>
                                    <span class="text-xs text-indigo-400 font-bold">Read Story →</span>
                                </div>
                            </template>
                            <template x-if="chapters.filter(c => c.novelId === activeNovel?.id).length === 0">
                                <div class="text-sm text-white/40 p-4 text-center border border-dashed border-white/10 rounded-xl">Is novel mein abhi koi chapter nahi likha gaya hai. Panel se naya chapter jodein.</div>
                            </template>
                        </div>
                    </div>
                </div>

                <div id="reader-view" class="rounded-[32px] border border-white/10 bg-zinc-900/80 p-6 space-y-4 shadow-2xl transition scroll-mt-24" x-show="activeChapter">
                    <div class="flex items-center justify-between border-b border-white/10 pb-3">
                        <div>
                            <h2 class="text-xl font-black text-indigo-400" x-text="activeChapter?.title"></h2>
                            <p class="text-xs text-zinc-400 mt-0.5" x-text="'Book: ' + activeNovel?.title"></p>
                        </div>
                        <button @click="activeChapter = null" class="bg-white/5 hover:bg-white/10 text-zinc-300 text-xs px-3 py-1.5 rounded-xl font-bold transition">✕ Close Reader</button>
                    </div>
                    <div class="text-zinc-200 text-base leading-relaxed whitespace-pre-line font-serif max-w-3xl mx-auto py-4 bg-black/20 p-5 rounded-2xl min-h-[200px]" x-text="activeChapter?.text"></div>
                    <div class="flex justify-center pt-2">
                        <button @click="activeChapter = null; window.scrollTo({top: 0, behavior: 'smooth'})" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-6 py-2.5 rounded-xl transition">Finished Reading</button>
                    </div>
                </div>

            </div>

            <div x-show="view === 'library'" class="space-y-4">
                <div class="rounded-[32px] border border-white/10 bg-white/5 p-5">
                    <h2 class="text-xl font-black">Library Collection Catalog</h2>
                </div>
                <div class="grid gap-4 sm:grid-cols-2 md:grid-cols-3">
                    <template x-for="n in novels">
                        <div @click="selectNovel(n); view='home'" class="rounded-[24px] border border-white/10 bg-black/40 p-4 cursor-pointer hover:bg-white/5 transition flex gap-4 items-center">
                            <img :src="n.cover" class="h-20 w-14 rounded-xl object-cover shadow-md" />
                            <div class="truncate flex-1">
                                <h3 class="font-bold text-sm text-zinc-100 truncate" x-text="n.title"></h3>
                                <p class="text-[11px] text-white/50" x-text="n.genre"></p>
                                <p class="text-[10px] text-indigo-400 mt-1 font-bold" x-text="chapters.filter(c => c.novelId === n.id).length + ' Chapters'"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'admin'" class="space-y-6">
                <div class="rounded-[32px] border border-white/10 bg-white/5 p-5">
                    <h2 class="text-xl font-black">Author Dashboard Engine</h2>
                    <div class="flex gap-2 mt-4 p-1 bg-black/40 rounded-xl max-w-max">
                        <button @click="adminTab = 'novels'" :class="adminTab === 'novels' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold transition">Write New Novel</button>
                        <button @click="adminTab = 'chapters'" :class="adminTab === 'chapters' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold transition">Write Chapter Script</button>
                        <button @click="adminTab = 'content'" :class="adminTab === 'content' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold transition">Manage Content</button>
                    </div>
                </div>

                <div class="rounded-[32px] border border-white/10 bg-white/5 p-6">
                    <div x-show="adminTab === 'novels'" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Novel Title</label>
                            <input x-model="formNovel.title" placeholder="Apni Novel ka naam likhein..." class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none text-zinc-100" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-black/30 p-4 rounded-2xl border border-white/5">
                            <div>
                                <label class="block text-xs font-bold text-indigo-400 mb-1">🖼️ Method A: Gallery se Photo Chunyein</label>
                                <input type="file" accept="image/*" @change="processImageUpload($event)" class="block w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer transition" />
                                <div x-show="formNovel.coverName" class="text-xs text-emerald-400 mt-1" x-text="'Selected: ' + formNovel.coverName"></div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-zinc-400 mb-1">🔗 Method B: Ya Direct Image Link (URL) Paste karein</label>
                                <input x-model="formNovel.coverUrl" placeholder="https://example.com/cover.jpg" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-xs outline-none text-zinc-300" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Genre</label>
                            <select x-model="formNovel.genre" class="w-full rounded-xl bg-zinc-900 border border-white/10 px-4 py-2.5 text-sm outline-none">
                                <option value="Romance">Romance ❤️</option>
                                <option value="Thriller">Thriller 🔪</option>
                                <option value="Fantasy">Fantasy 🔮</option>
                                <option value="Drama">Drama 🎭</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Novel Short Description / Synopsis</label>
                            <textarea x-model="formNovel.description" rows="3" placeholder="Is kahani ke baare mein kuch likhein jo readers ko pasand aaye..." class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none text-zinc-200"></textarea>
                        </div>
                        <button @click="submitNovel()" class="rounded-xl bg-white px-5 py-2.5 text-xs font-bold text-black hover:bg-zinc-200 transition">➕ Create Novel Book</button>
                    </div>

                    <div x-show="adminTab === 'chapters'" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Select Novel Book</label>
                            <select x-model="formChapter.novelId" class="w-full rounded-xl bg-zinc-900 border border-white/10 px-4 py-2.5 text-sm outline-none">
                                <option value="">-- Kis Novel me jodna hai? --</option>
                                <template x-for="n in novels">
                                    <option :value="n.id" x-text="n.title"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Chapter Title</label>
                            <input x-model="formChapter.title" placeholder="e.g. Chapter 1: Nayi Shuruaat" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none text-zinc-100" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-indigo-400 mb-1">✍️ Write Story Text Content (Poori Kahani Yahan Likhein)</label>
                            <textarea x-model="formChapter.text" rows="12" placeholder="Yahan apni kahani poori vistar se likhein... Paragraphs badalne ke liye Enter dabayein." class="w-full rounded-xl bg-black/20 border border-white/10 p-4 text-sm outline-none font-serif text-zinc-100 leading-relaxed"></textarea>
                        </div>
                        <button @click="submitChapter()" class="w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 py-3 text-xs font-bold text-white transition">🚀 Publish Story Chapter</button>
                    </div>

                    <div x-show="adminTab === 'content'" class="space-y-3">
                        <template x-for="novel in novels">
                            <div class="p-4 bg-black/30 rounded-2xl border border-white/5 flex flex-col gap-2">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <img :src="novel.cover" class="h-10 w-8 object-cover rounded" />
                                        <h4 class="text-sm font-bold text-white" x-text="novel.title"></h4>
                                    </div>
                                    <button @click="deleteNovel(novel.id)" class="text-[11px] font-bold bg-red-500/10 text-red-400 hover:bg-red-500/20 px-2.5 py-1 rounded-xl transition">🗑️ Delete Novel</button>
                                </div>
                                <div class="pl-4 border-l-2 border-zinc-800 space-y-1 mt-2">
                                    <template x-for="ch in chapters.filter(c => c.novelId === novel.id)">
                                        <div class="text-[12px] flex justify-between bg-zinc-900/50 p-2.5 rounded-xl">
                                            <span class="text-zinc-300" x-text="ch.title"></span>
                                            <button @click="deleteChapter(ch.id, novel.id)" class="text-red-400 font-semibold text-[11px] hover:underline">✕ Delete Chapter</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function guguApp() {
            return {
                view: 'home',
                adminTab: 'novels',
                mobileNavOpen: false,
                
                novels: JSON.parse(localStorage.getItem('gn_books_v1')) || [
                    { id: "n1", title: "अस्वीकृति", genre: "Romance", cover: "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=300&q=80", description: "Ek adhuri dastan jo khamoshi se shuru hui." }
                ],
                
                chapters: JSON.parse(localStorage.getItem('gn_chapters_v1')) || [
                    { id: "c1", novelId: "n1", title: "Chapter 1: Pehla Kadam", text: "Yeh kahani ka pehla panna hai.\n\nPurani yadein hamesha dil mein ghar bana leti hain, chahe hum kitna bhi aage badh jayein. Dhruv ne jab piche mudkar dekha toh rasta dundhla tha, par uski yaadein bilkul saaf thi..." }
                ],

                activeNovel: null,
                activeChapter: null,
                
                formNovel: { title: '', cover: '', coverName: '', coverUrl: '', genre: 'Romance', description: '' },
                formChapter: { novelId: '', title: '', text: '' },

                init() {
                    if (!localStorage.getItem('gn_books_v1')) {
                        this.saveDataToStorage();
                    }
                    if (this.novels.length > 0) {
                        this.activeNovel = this.novels[0];
                        this.formChapter.novelId = this.novels[0].id;
                    }
                },

                selectNovel(novel) {
                    this.activeNovel = novel;
                    this.activeChapter = null;
                },

                readChapter(chapter) {
                    this.activeChapter = chapter;
                    setTimeout(() => {
                        document.getElementById('reader-view')?.scrollIntoView({ behavior: 'smooth' });
                    }, 80);
                },

                // 🌟 Image ko upload karte samay uski size choti (compress) karne ka naya function
                processImageUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    this.formNovel.coverName = file.name;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 400; // Image ki maximum choudai
                            const MAX_HEIGHT = 600; // Image ki maximum lambai
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // Image ko compress karke JPEG mein badalna
                            this.formNovel.cover = canvas.toDataURL('image/jpeg', 0.7);
                        };
                    };
                    reader.readAsDataURL(file);
                },

                submitNovel() {
                    if(!this.formNovel.title || !this.formNovel.description) return alert("Novel Name aur Description bharna zaroori hai!");
                    
                    const defaultCover = "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=300&q=80";
                    
                    let finalCover = defaultCover;
                    if (this.formNovel.cover && this.formNovel.cover.trim() !== '') {
                        finalCover = this.formNovel.cover;
                    } else if (this.formNovel.coverUrl && this.formNovel.coverUrl.trim() !== '') {
                        finalCover = this.formNovel.coverUrl.trim();
                    }

                    const newNovel = {
                        id: "n-" + Date.now(),
                        title: this.formNovel.title,
                        genre: this.formNovel.genre,
                        cover: finalCover,
                        description: this.formNovel.description
                    };
                    
                    this.novels.push(newNovel);
                    
                    // Storage check karne ke baad clear function run karein
                    const isSaved = this.saveDataToStorage();
                    if(isSaved) {
                        this.activeNovel = newNovel;
                        this.formNovel = { title: '', cover: '', coverName: '', coverUrl: '', genre: 'Romance', description: '' };
                        alert("Nayi Novel Book create ho gayi!");
                        this.view = 'home';
                    } else {
                        // Agar save nahi hua (Storage full hone ke karan) toh wapas list se novel hata dein
                        this.novels.pop(); 
                    }
                },

                submitChapter() {
                    if(!this.formChapter.novelId || !this.formChapter.title || !this.formChapter.text) {
                        return alert("Novel select karein, Chapter title likhein aur Story Text likhein!");
                    }

                    const newCh = {
                        id: "c-" + Date.now(),
                        novelId: this.formChapter.novelId,
                        title: this.formChapter.title,
                        text: this.formChapter.text
                    };

                    this.chapters.push(newCh);
                    
                    const isSaved = this.saveDataToStorage();
                    if(isSaved) {
                        alert("Story Chapter successfully publish ho gaya!");
                        const savedNovelId = this.formChapter.novelId;
                        this.formChapter = { novelId: savedNovelId, title: '', text: '' };
                        this.view = 'home';
                    } else {
                        this.chapters.pop();
                    }
                },

                deleteNovel(novelId) {
                    if(!confirm("Kya aap is novel aur iske saare chapters ko permanent delete karna chahte hain?")) return;
                    this.chapters = this.chapters.filter(c => c.novelId !== novelId);
                    this.novels = this.novels.filter(n => n.id !== novelId);
                    this.saveDataToStorage();
                    
                    if(this.activeNovel && this.activeNovel.id === novelId) {
                        this.activeNovel = this.novels.length > 0 ? this.novels[0] : null;
                    }
                    this.activeChapter = null;
                    alert("Novel Deleted!");
                },

                deleteChapter(chapterId, novelId) {
                    if(!confirm("Kya is chapter ko delete karna hai?")) return;
                    this.chapters = this.chapters.filter(c => c.id !== chapterId);
                    this.saveDataToStorage();
                    this.activeChapter = null;
                    alert("Chapter Removed!");
                },

                // 🌟 Storage Full hone par alert dene wala naya logic
                saveDataToStorage() {
                    try {
                        localStorage.setItem('gn_books_v1', JSON.stringify(this.novels));
                        localStorage.setItem('gn_chapters_v1', JSON.stringify(this.chapters));
                        return true;
                    } catch (e) {
                        console.error(e);
                        alert("⚠️ Storage Full Ho Gayi Hai! Browser mein jyada data save nahi ho sakta. Kripya apni kuch purani novels delete karein ya phir sirf Direct Image Link (URL) ka hi istemal karein.");
                        return false;
                    }
                }
            }
        }
    </script>
</body>
</html>
