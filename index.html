<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuGu FM — Premium Audio Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="guguApp()" class="bg-[#06070b] text-white font-sans antialiased selection:bg-indigo-500/30">

    <header class="fixed inset-x-0 top-0 z-40 border-b border-white/10 bg-[#06070b]/90 backdrop-blur-xl">
        <div class="mx-auto flex max-w-[1600px] items-center gap-3 px-4 py-3 lg:px-6">
            <button @click="mobileNavOpen = !mobileNavOpen" class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 lg:hidden">
                <span x-text="mobileNavOpen ? '✕' : '☰'"></span>
            </button>
            <div class="flex items-center gap-3">
                <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 via-fuchsia-500 to-emerald-400 text-sm font-black shadow-lg shadow-fuchsia-500/20">GF</div>
                <div>
                    <div class="text-lg font-semibold leading-none">GuGu FM</div>
                    <div class="text-xs text-white/55">Secure Live Player</div>
                </div>
            </div>
            <div class="hidden flex-1 items-center gap-3 lg:flex pl-4">
                <button @click="view = 'home'" :class="view === 'home' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Home</button>
                <button @click="view = 'library'" :class="view === 'library' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Library</button>
                <button @click="view = 'admin'" :class="view === 'admin' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="rounded-2xl px-4 py-2 text-sm transition font-medium">Admin</button>
            </div>
        </div>
    </header>

    <div x-show="mobileNavOpen" x-transition class="fixed inset-x-0 top-[68px] z-50 bg-[#06070b] border-b border-white/10 p-4 lg:hidden space-y-2">
        <button @click="view = 'home'; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">🏠 Home</button>
        <button @click="view = 'library'; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">📚 Library</button>
        <button @click="view = 'admin'; mobileNavOpen = false" class="w-full text-left p-3 rounded-xl bg-white/5 text-sm font-medium">⚙️ Admin Dashboard</button>
    </div>

    <div class="mx-auto grid max-w-[1600px] grid-cols-1 gap-4 px-4 pb-28 pt-24 lg:grid-cols-[260px_1fr] lg:px-6">
        
        <aside class="hidden lg:block">
            <div class="sticky top-24 space-y-3 rounded-[28px] border border-white/10 bg-white/5 p-4">
                <button @click="view = 'home'" :class="view === 'home' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">🏠 Home</button>
                <button @click="view = 'library'" :class="view === 'library' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">📚 Library</button>
                <button @click="view = 'admin'" :class="view === 'admin' ? 'bg-white text-black' : 'bg-white/5 text-white/80'" class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm transition">⚙️ Admin Dashboard</button>
            </div>
        </aside>

        <main class="space-y-6">
            
            <div x-show="view === 'home'" class="space-y-8">

                <div class="space-y-3">
                    <div class="font-bold text-zinc-100">📚 Available Novels</div>
                    <div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
                        <template x-for="novel in novels">
                            <div @click="selectNovel(novel)" :class="activeNovel?.id === novel.id ? 'border-indigo-500 bg-indigo-500/10' : 'border-white/10 bg-white/5'" class="min-w-[200px] max-w-[200px] rounded-[24px] border p-3 cursor-pointer transition">
                                <img :src="novel.cover" class="h-40 w-full object-cover rounded-xl" />
                                <h4 class="font-bold text-sm mt-2 truncate" x-text="novel.title"></h4>
                                <p class="text-[11px] text-white/50" x-text="novel.genre"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="rounded-[32px] border border-white/10 bg-white/5 p-5" x-show="activeNovel">
                    <h3 class="text-lg font-bold mb-2 text-indigo-400" x-text="'📖 ' + activeNovel?.title + ' - Chapters'"></h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">
                        <template x-for="ch in chapters.filter(c => c.novelId === activeNovel?.id)">
                            <div class="flex flex-col justify-between rounded-xl border border-white/5 bg-zinc-900/60 p-4">
                                <div>
                                    <div class="font-bold text-sm text-zinc-100" x-text="ch.title"></div>
                                    <div class="text-xs text-emerald-400 mt-1 truncate" x-text="'🎵 File: ' + ch.audioName"></div>
                                    <p class="text-xs text-zinc-400 mt-2 line-clamp-3 bg-black/30 p-2 rounded" x-text="ch.text"></p>
                                </div>
                                <button @click="playChapterTrack(ch)" class="mt-3 w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 px-4 py-2 text-xs font-bold text-white transition text-center">
                                    ▶ Play This Chapter Audio
                                </button>
                            </div>
                        </template>
                        <template x-if="chapters.filter(c => c.novelId === activeNovel?.id).length === 0">
                            <div class="text-xs text-white/40 p-2">Is novel me koi chapter nahi mila. Admin dashboard me jaakar chapter aur audio add karein.</div>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="view === 'library'" class="space-y-4">
                <div class="rounded-[32px] border border-white/10 bg-white/5 p-5">
                    <h2 class="text-xl font-black">Library Stock</h2>
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <template x-for="n in novels">
                        <div @click="selectNovel(n); view='home'" class="rounded-[24px] border border-white/10 bg-black/40 p-4 cursor-pointer hover:bg-white/5 transition flex gap-4">
                            <img :src="n.cover" class="h-16 w-12 rounded-xl object-cover" />
                            <div>
                                <h3 class="font-bold text-sm text-zinc-100" x-text="n.title"></h3>
                                <p class="text-[11px] text-white/50" x-text="n.genre"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'admin'" class="space-y-6">
                <div class="rounded-[32px] border border-white/10 bg-white/5 p-5">
                    <h2 class="text-xl font-black">Creator Admin Console</h2>
                    <div class="flex gap-2 mt-4 p-1 bg-black/40 rounded-xl max-w-max">
                        <button @click="adminTab = 'novels'" :class="adminTab === 'novels' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold">Add Novel</button>
                        <button @click="adminTab = 'chapters'" :class="adminTab === 'chapters' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold">Add Chapter</button>
                        <button @click="adminTab = 'content'" :class="adminTab === 'content' ? 'bg-white text-black' : 'text-white/70'" class="rounded-lg px-3 py-1.5 text-xs font-bold">Manage / Delete</button>
                    </div>
                </div>

                <div class="rounded-[32px] border border-white/10 bg-white/5 p-6">
                    <div x-show="adminTab === 'novels'" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Novel Title</label>
                            <input x-model="formNovel.title" placeholder="Novel Name" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Genre</label>
                            <select x-model="formNovel.genre" class="w-full rounded-xl bg-zinc-900 border border-white/10 px-4 py-2.5 text-sm outline-none">
                                <option value="Romance">Romance</option><option value="Thriller">Thriller</option><option value="Fantasy">Fantasy</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Description</label>
                            <textarea x-model="formNovel.description" rows="2" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none"></textarea>
                        </div>
                        <button @click="submitNovel()" class="rounded-xl bg-white px-4 py-2 text-xs font-bold text-black">➕ Create Novel</button>
                    </div>

                    <div x-show="adminTab === 'chapters'" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Select Novel</label>
                            <select x-model="formChapter.novelId" class="w-full rounded-xl bg-zinc-900 border border-white/10 px-4 py-2.5 text-sm outline-none">
                                <option value="">-- Choose Novel --</option>
                                <template x-for="n in novels">
                                    <option :value="n.id" x-text="n.title"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Chapter Title</label>
                            <input x-model="formChapter.title" placeholder="e.g. Chapter 1" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1">Written Script Story Text</label>
                            <textarea x-model="formChapter.text" rows="3" class="w-full rounded-xl bg-black/20 border border-white/10 px-4 py-2.5 text-sm outline-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-amber-400 mb-1">🎵 Upload Audio File (.mp3)</label>
                            <input type="file" accept="audio/*" @change="processAudioUpload($event)" class="block w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500" />
                            <div x-show="formChapter.audioName" class="text-xs text-emerald-400 mt-1" x-text="'Selected: ' + formChapter.audioName"></div>
                        </div>
                        <button @click="submitChapter()" class="w-full rounded-xl bg-indigo-500 py-3 text-xs font-bold text-white">➕ Save & Link Chapter Audio</button>
                    </div>

                    <div x-show="adminTab === 'content'" class="space-y-3">
                        <template x-for="novel in novels">
                            <div class="p-3 bg-black/30 rounded-xl border border-white/5 flex flex-col gap-2">
                                <div class="flex items-center justify-between">
                                    <h4 class="text-xs font-bold text-white" x-text="novel.title"></h4>
                                    <button @click="deleteNovel(novel.id)" class="text-[10px] font-bold bg-red-500/20 text-red-400 px-2 py-1 rounded">🗑️ Delete Novel</button>
                                </div>
                                <div class="pl-4 border-l border-zinc-800 space-y-1">
                                    <template x-for="ch in chapters.filter(c => c.novelId === novel.id)">
                                        <div class="text-[11px] flex justify-between bg-zinc-900/40 p-2 rounded">
                                            <span x-text="ch.title"></span>
                                            <button @click="deleteChapter(ch.id, novel.id)" class="text-red-400 text-[10px]">✕ Remove</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="fixed inset-x-0 bottom-0 z-50 border-t border-white/10 bg-[#090a0f]/95 py-3 shadow-2xl">
        <div class="mx-auto flex max-w-[1600px] items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-indigo-600 rounded flex items-center justify-center font-bold">📻</div>
                <div>
                    <div class="text-xs font-bold text-white" x-text="playerTitle"></div>
                    <div class="text-[10px] text-emerald-400" x-text="playerSource"></div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button @click="togglePlay()" class="h-11 w-11 flex items-center justify-center rounded-full bg-indigo-500 text-white font-bold text-xl shadow">
                    <span x-text="isPlaying ? '⏸' : '▶'"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function guguApp() {
            return {
                view: 'home',
                adminTab: 'novels',
                mobileNavOpen: false,
                search: '',
                genreFilter: 'All',
                
                isPlaying: false,
                audioEngine: new Audio(),
                playerTitle: "No Track Loaded",
                playerSource: "System Idle",

                novels: JSON.parse(localStorage.getItem('gugu_novels_v5')) || [
                    { id: "n1", title: "Midnight Echoes", genre: "Thriller", cover: "https://images.unsplash.com/photo-1516972810927-80185027ca84?auto=format&fit=crop&w=300&q=80", description: "A city hears whispers at night.", chapters: 1 }
                ],
                
                chapters: JSON.parse(localStorage.getItem('gugu_chapters_v5')) || [
                    { id: "c1", novelId: "n1", title: "Chapter 1: Dynamic Secure Stream", audioName: "Secure_Default_Demo.mp3", text: "Welcome back. Audio routing protocols are fully fixed and running secure structural payloads.", url: "https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" }
                ],

                activeNovel: null,
                formNovel: { title: '', genre: 'Romance', description: '' },
                formChapter: { novelId: '', title: '', text: '', audioUrl: '', audioName: '' },

                init() {
                    if (!localStorage.getItem('gugu_novels_v5')) {
                        this.saveDataToStorage();
                    }
                    if (this.novels.length > 0) {
                        this.activeNovel = this.novels[0];
                        this.formChapter.novelId = this.novels[0].id;
                    }
                },

                selectNovel(novel) {
                    this.activeNovel = novel;
                },

                processAudioUpload(event) {
                    const file = event.target.files[0];
                    if(!file) return;
                    this.formChapter.audioName = file.name;
                    this.formChapter.audioUrl = URL.createObjectURL(file);
                },

                playChapterTrack(chapter) {
                    if (!chapter.url) {
                        alert("Is track ka audio token link expire ho chuka hai. Admin page se audio re-upload karein.");
                        return;
                    }
                    
                    this.audioEngine.pause();
                    this.audioEngine.src = chapter.url;
                    this.playerTitle = chapter.title;
                    this.playerSource = "Now Playing: " + chapter.audioName;
                    
                    this.audioEngine.play()
                        .then(() => { this.isPlaying = true; })
                        .catch(e => {
                            console.error(e);
                            alert("Audio loading error. Kripya naya audio track upload karke check karein.");
                        });
                },

                togglePlay() {
                    if(!this.audioEngine.src) return;
                    if(this.isPlaying) {
                        this.audioEngine.pause();
                        this.isPlaying = false;
                    } else {
                        this.audioEngine.play().then(() => { this.isPlaying = true; });
                    }
                },

                submitNovel() {
                    if(!this.formNovel.title || !this.formNovel.description) return alert("Fields fill karein!");
                    const newNovel = {
                        id: "n-" + Date.now(),
                        title: this.formNovel.title,
                        genre: this.formNovel.genre,
                        cover: "https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=300&q=80",
                        description: this.formNovel.description,
                        chapters: 0
                    };
                    this.novels.push(newNovel);
                    this.saveDataToStorage();
                    this.activeNovel = newNovel;
                    this.formNovel = { title: '', genre: 'Romance', description: '' };
                    alert("Novel Create ho gayi!");
                    this.view = 'home';
                },

                submitChapter() {
                    if(!this.formChapter.novelId || !this.formChapter.title || !this.formChapter.audioUrl) {
                        return alert("Sabhi fields aur Audio select karna zaroori hai!");
                    }

                    const newCh = {
                        id: "c-" + Date.now(),
                        novelId: this.formChapter.novelId,
                        title: this.formChapter.title,
                        audioName: this.formChapter.audioName,
                        text: this.formChapter.text,
                        url: this.formChapter.audioUrl 
                    };

                    this.chapters.push(newCh);
                    
                    let target = this.novels.find(n => n.id === this.formChapter.novelId);
                    if(target) target.chapters += 1;

                    this.saveDataToStorage();

                    alert("Chapter successfully link ho gaya! Bina refresh kiye Home tab par jaakar check karein.");
                    this.formChapter = { novelId: this.novels[0]?.id || '', title: '', text: '', audioUrl: '', audioName: '' };
                    this.view = 'home';
                },

                deleteNovel(novelId) {
                    if(!confirm("Kya aap is novel ko delete karna chahte hain?")) return;
                    this.chapters = this.chapters.filter(c => c.novelId !== novelId);
                    this.novels = this.novels.filter(n => n.id !== novelId);
                    this.saveDataToStorage();
                    if(this.activeNovel && this.activeNovel.id === novelId) {
                        this.activeNovel = this.novels.length > 0 ? this.novels[0] : null;
                    }
                    alert("Novel Deleted!");
                },

                deleteChapter(chapterId, novelId) {
                    if(!confirm("Chapter delete karein?")) return;
                    this.chapters = this.chapters.filter(c => c.id !== chapterId);
                    let target = this.novels.find(n => n.id === novelId);
                    if(target && target.chapters > 0) target.chapters -= 1;
                    this.saveDataToStorage();
                    alert("Chapter Removed!");
                },

                saveDataToStorage() {
                    localStorage.setItem('gugu_novels_v5', JSON.stringify(this.novels));
                    localStorage.setItem('gugu_chapters_v5', JSON.stringify(this.chapters));
                }
            }
        }
    </script>
</body>
</html>
